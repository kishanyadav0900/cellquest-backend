<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/cellquest-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2e7d32" />
    <meta
      name="description"
      content="Cell Quest India - Advanced Diagnostic Laboratory in Gurgaon, Haryana. Book pathology, microbiology &amp; biochemistry tests online."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/cellquest-logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Cell Quest India | Advanced Diagnostic Laboratory</title>
    <style>
      :root {
        --bs-primary: #5a8a1a !important;
        --bs-primary-rgb: 90, 138, 26 !important;
        --bs-secondary: #F87154 !important;
        --bs-secondary-rgb: 248, 113, 84 !important;
        --cq-green: #E7F1A8;
        --cq-orange: #F87154;
        --cq-cream: #FFFFDD;
      }
      body { background: #FFFFDD; }
      /* Green primary (darker lime for contrast) */
      .bg-primary { background-color: #5a8a1a !important; }
      .btn-primary { background-color: #F87154 !important; border-color: #F87154 !important; }
      .btn-primary:hover { background-color: #e05a3a !important; border-color: #e05a3a !important; }
      .btn-outline-primary { color: #5a8a1a !important; border-color: #5a8a1a !important; }
      .btn-outline-primary:hover { background-color: #5a8a1a !important; border-color: #5a8a1a !important; color: #fff !important; }
      .text-primary { color: #5a8a1a !important; }
      .border-primary { border-color: #5a8a1a !important; }
      /* Orange secondary */
      .bg-secondary { background-color: #F87154 !important; }
      .btn-secondary { background-color: #F87154 !important; border-color: #F87154 !important; color: #fff !important; }
      .btn-secondary:hover { background-color: #e05a3a !important; border-color: #e05a3a !important; }
      .text-secondary { color: #F87154 !important; }
      /* Links */
      a { color: #5a8a1a; }
      a:hover { color: #F87154; }
      /* Light backgrounds */
      .bg-light { background-color: #E7F1A8 !important; }
      /* Footer */
      .footer.bg-dark { background: linear-gradient(135deg, #3d5e10, #5a8a1a) !important; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
